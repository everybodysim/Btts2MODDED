<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Big Tower Tiny Square 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Local CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- === FETCH OVERRIDE: Local first, then CDN === -->
  <script>
    const BASE_URL = "https://cdn.jsdelivr.net/gh/bubbls/ruffle@716475a57912e1ed4ac40db3a155b5e862be48ad/btts22/";
    const originalFetch = window.fetch;

    window.fetch = async function(resource, init) {
      try {
        // Try local file first
        let response = await originalFetch(resource, init);
        if (!response.ok) throw new Error("Local fetch failed");
        return response;
      } catch (e) {
        // Fallback to CDN
        return originalFetch(BASE_URL + resource, init);
      }
    };

    // Optional: simple page error logger (since you can't open console)
    window.addEventListener("error", e => {
      document.body.innerHTML = "<pre style='color:red'>" + e.message + "\n" + e.filename + ":" + e.lineno + "</pre>";
    });
  </script>

  <!-- Local JS (editable) -->
  <script type="module" src="c3runtime.js"></script>
  <script type="module" src="main.js"></script>
  <script src="box2d.wasm.js"></script>
  <script src="offlineclient.js" type="module"></script>
  <script src="register-sw.js" type="module"></script>
  <script src="supportcheck.js"></script>

</head>
<body>
  <noscript>
    <div style="color:red;">JavaScript is required to run this game.</div>
  </noscript>
</body>
</html>
